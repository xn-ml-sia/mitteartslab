    <div class="portfolio-shell">
      <mal-chapter-header logo-variant="bottom"></mal-chapter-header>

      <section class="portfolio-okpalette-hero-wrap" aria-label="Portfolio hero">
        <div class="l-wrap">
      <div class="l-layout">
        <div class="l-main">
          <article class="l-app" aria-label="OKpalette Extraction">
            <div class="l-app__header">
              <div class="menu">
                <!--<h1 class="menu-logo">OKPalette</h1>-->
                <!-- <button class="button button--icon button--mask" id="drawSelectionBtn">
                  <span>Draw Mask</span>
                </button> -->
                <div class="menu__item">
                  <div class="button button--label button--count" id="colorCountLabel">
                    <label for="colorCountInput">Colors</label>

                    <div class="button__group">
                      <span class="numberslider" style="--relval: 0.33">
                        <button class="numberslider__button">-</button>
                        <input
                          class="numberslider__input"
                          type="number"
                          id="colorCountInput"
                          min="2"
                          max="25"
                          value="8"
                        />
                        <button class="numberslider__button">+</button>
                      </span>
                      <label class="checkbox checkbox--button">
                        <input type="checkbox" id="lockColorCount" />
                        <span class="reset__icon"> </span>
                      </label>
                    </div>
                  </div>
                </div>
                <div class="menu__item">
                  <label class="button button--label">
                    <span>Auto-Detect Bias</span>
                    <span class="checkbox checkbox--toggle">
                      <input type="checkbox" id="autoDetect" checked />
                      <span class="checkbox__toggle" aria-hidden="true"></span>
                    </span>
                  </label>
                </div>
                <div class="menu__item">
                  <button
                    class="button button--end button--icon button--upload"
                    id="replaceImageBtn"
                  >
                    <svg
                      class="button__icon"
                      stroke-width="1.5"
                      viewBox="0 0 24 24"
                      fill="none"
                      xmlns="http://www.w3.org/2000/svg"
                    >
                      <path
                        d="M6 20L18 20"
                        stroke="currentColor"
                        stroke-width="1.5"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                      ></path>
                      <path
                        d="M12 16V4M12 4L15.5 7.5M12 4L8.5 7.5"
                        stroke="currentColor"
                        stroke-width="1.5"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                      ></path>
                    </svg>
                    <span>Replace Image</span>
                  </button>
                </div>
              </div>
            </div>
            <div class="l-app__drawers l-app__drawers--top">
              <div class="l-app__drawer">
                <aside class="drawer" aria-label="Bias Settings">
                  <div class="drawer__section drawer__section--half">
                    <div class="field field--range">
                      <div class="field__header">
                        <span class="field__header-start">Muted</span>
                        <span class="field__header-center"><i id="colorfulnessValue">0.00</i></span>
                        <span class="field__header-end">Saturated</span>
                      </div>
                      <div class="range" style="--graduations: 5; --progress: 0.5; --center: 0.5">
                        <input
                          type="range"
                          id="colorfulnessSlider"
                          min="-100"
                          max="100"
                          value="0"
                        />
                        <div class="range-highlight"></div>
                        <i class="range-marker"></i>
                      </div>
                    </div>
                  </div>
                  <div class="drawer__section drawer__section--half">
                    <div class="field field--range">
                      <div class="field__header">
                        <span class="field__header-start">Dark</span>
                        <span class="field__header-center"><i id="biasValue">0.00</i></span>
                        <span class="field__header-end">Light</span>
                      </div>
                      <div class="range" style="--graduations: 5; --progress: 0.5; --center: 0.5">
                        <input type="range" id="biasSlider" min="-100" max="100" value="0" />
                        <div class="range-highlight"></div>
                        <i class="range-marker"></i>
                      </div>
                    </div>
                  </div>
                </aside>
              </div>
            </div>
            <div class="l-app__drawers l-app__drawers--bottom">
              <div class="l-app__drawer">
                <aside class="drawer" aria-label="Image Stats">
                  <div class="drawer__section">
                    <div class="distribution-bar" id="distributionBar"></div>
                  </div>
                  <div class="drawer__section drawer__section--half">
                    <ul class="stats">
                      <li class="stats__row">
                        <span class="stats__label">Avg Lightness</span>
                        <div class="stats__bar">
                          <div class="stats__bar-fill lightness" id="barLightness"></div>
                        </div>
                        <span
                          class="stats__value"
                          id="statLightness"
                          title="Average perceived brightness of the palette (0% = black, 100% = white)"
                          >36.6%</span
                        >
                      </li>
                      <li class="stats__row">
                        <span class="stats__label">Avg Chroma</span>
                        <div class="stats__bar">
                          <div class="stats__bar-fill chroma" id="barChroma"></div>
                        </div>
                        <span
                          class="stats__value"
                          id="statChroma"
                          title="Average color intensity or saturation (0 = gray, higher = more vibrant)"
                          >0.020</span
                        >
                      </li>
                      <li class="stats__row">
                        <span class="stats__label">Colorfulness</span>
                        <div class="stats__bar stats__bar--centered">
                          <div
                            class="stats__bar-fill stats__bar-fill--centered"
                            id="barColorfulnessBias"
                          ></div>
                        </div>
                        <span
                          class="stats__value"
                          id="statColorfulness"
                          title="Tendency towards muted (-1) or saturated (+1) colors"
                          >0.50</span
                        >
                      </li>
                      <li class="stats__row">
                        <span class="stats__label">Light/Dark</span>
                        <div class="stats__bar stats__bar--centered">
                          <div
                            class="stats__bar-fill stats__bar-fill--centered"
                            id="barLightDarkBias"
                          ></div>
                        </div>
                        <span
                          class="stats__value"
                          id="statBias"
                          title="Tendency towards darker (-1) or lighter (+1) colors"
                          >-0.09</span
                        >
                      </li>
                      <li class="stats__row">
                        <span class="stats__label">Sparse Color</span>
                        <span class="stats__bar"></span>
                        <span
                          class="stats__value"
                          id="statSparse"
                          title="Indicates whether the image has limited color variation"
                          >Yes</span
                        >
                      </li>
                    </ul>
                    <div class="drawer__hint" title="Open 3D debug visualization">
                      ⌘/Ctrl+I for <button class="link" id="debugViewLink">debug view</button>
                    </div>
                  </div>
                  <div class="drawer__section drawer__section--half">
                    <svg
                      id="colorSpaceSvg"
                      viewBox="0 0 200 200"
                      preserveAspectRatio="xMidYMid meet"
                      style="touch-action: none"
                    ></svg>
                    <a
                      class="spectrum-section__link"
                      href="https://amandahinton.com/blog/generating-a-color-spectrum-for-an-image"
                      target="_blank"
                      rel="noopener"
                      aria-label="Color spectrum — read about the technique by Amanda Hinton"
                    >
                      <canvas class="spectrum-section__canvas" id="spectrumCanvas"></canvas>
                      <span class="spectrum-section__readout" id="spectrumReadout" hidden></span>
                    </a>
                  </div>
                  <div class="menu menu--end menu--drawer">
                    <div class="menu__item">
                      <button class="button button--icon" id="btnHsvCylinder">
                        <svg
                          class="button__icon"
                          xmlns="http://www.w3.org/2000/svg"
                          viewBox="0 0 24 24"
                          fill="none"
                          stroke="currentColor"
                          stroke-width="1"
                        >
                          <circle cx="12" cy="12" r="9" vector-effect="non-scaling-stroke" />
                        </svg>
                        <span>HSV Cylinder</span>
                      </button>
                    </div>
                    <div class="menu__item">
                      <button class="button button--icon button--end" id="btnHsvCube">
                        <svg
                          class="button__icon"
                          xmlns="http://www.w3.org/2000/svg"
                          viewBox="0 0 24 24"
                          fill="none"
                          stroke="currentColor"
                          stroke-width="1"
                        >
                          <rect
                            x="3"
                            y="3"
                            width="18"
                            height="18"
                            vector-effect="non-scaling-stroke"
                          />
                        </svg>
                        <span>HSV Cube</span>
                      </button>
                    </div>
                    <div class="menu__item">
                      <button class="button button--icon button--end" id="btnSpectrum">
                        <svg
                          class="button__icon"
                          xmlns="http://www.w3.org/2000/svg"
                          viewBox="0 0 24 24"
                          fill="none"
                          stroke="currentColor"
                          stroke-width="1"
                        >
                          <polygon
                            points="12,3.3 22,20.7 2,20.7"
                            vector-effect="non-scaling-stroke"
                          />
                        </svg>
                        <span>Spectrum</span>
                      </button>
                    </div>
                  </div>
                </aside>
              </div>
            </div>

                </div>

              <svg
                class="mask"
                id="selectionOverlay"
                aria-hidden="true"
                preserveAspectRatio="none"
                viewBox="0 0 1000 1000"
                style="display: none; pointer-events: none"
              >
                <defs>
                  <pattern
                    id="selectionHatch"
                    width="3"
                    height="3"
                    patternUnits="userSpaceOnUse"
                    patternTransform="rotate(45)"
                  >
                    <line
                      x1="0"
                      y1="0"
                      x2="0"
                      y2=".5"
                      stroke="var(--c-surface-on)"
                      stroke-width="2"
                      vector-effect="non-scaling-stroke"
                    ></line>
                  </pattern>

                  <mask
                    id="selectionOutsideMask"
                    maskUnits="userSpaceOnUse"
                    maskContentUnits="userSpaceOnUse"
                  >
                    <rect
                      id="selectionMaskBg"
                      x="0"
                      y="0"
                      width="1000"
                      height="1000"
                      fill="white"
                    ></rect>
                    <rect
                      id="selectionMaskCutout"
                      x="150"
                      y="150"
                      width="700"
                      height="700"
                      fill="black"
                    ></rect>
                  </mask>

                  <rect
                    id="cornerMarker"
                    width="8"
                    height="8"
                    fill="var(--c-surface)"
                    stroke="currentColor"
                    stroke-width="1"
                    vector-effect="non-scaling-stroke"
                  ></rect>
                  <rect id="cornerMarkerInner" width="5" height="6" fill="currentColor"></rect>
                </defs>

                <rect
                  id="selectionBgRect"
                  x="0"
                  y="0"
                  width="1000"
                  height="1000"
                  fill="var(--c-surface)"
                  mask="url(#selectionOutsideMask)"
                  opacity="0.2"
                ></rect>
                <rect
                  id="selectionHatchRect"
                  x="0"
                  y="0"
                  width="1000"
                  height="1000"
                  fill="url(#selectionHatch)"
                  mask="url(#selectionOutsideMask)"
                ></rect>
                <rect
                  id="selectionOutline"
                  x="0"
                  y="0"
                  width="0"
                  height="0"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1"
                  stroke-dasharray="2 2"
                  vector-effect="non-scaling-stroke"
                ></rect>

                <use
                  id="cornerTopLeft"
                  href="#cornerMarker"
                  x="0"
                  y="0"
                  style="display: none"
                ></use>
                <use
                  id="cornerTopRight"
                  href="#cornerMarker"
                  x="0"
                  y="0"
                  style="display: none"
                ></use>
                <use
                  id="cornerBottomLeft"
                  href="#cornerMarker"
                  x="0"
                  y="0"
                  style="display: none"
                ></use>
                <use
                  id="cornerBottomRight"
                  href="#cornerMarker"
                  x="0"
                  y="0"
                  style="display: none"
                ></use>

                <use
                  id="cornerTopLeftInner"
                  href="#cornerMarkerInner"
                  x="0"
                  y="0"
                  style="display: none"
                ></use>
                <use
                  id="cornerTopRightInner"
                  href="#cornerMarkerInner"
                  x="0"
                  y="0"
                  style="display: none"
                ></use>
                <use
                  id="cornerBottomLeftInner"
                  href="#cornerMarkerInner"
                  x="0"
                  y="0"
                  style="display: none"
                ></use>
                <use
                  id="cornerBottomRightInner"
                  href="#cornerMarkerInner"
                  x="0"
                  y="0"
                  style="display: none"
                ></use>
              </svg>
