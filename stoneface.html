<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mitte arts lab : stone gallery</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%2016%2016%22%3E%3Crect%20width%3D%2216%22%20height%3D%2216%22%20fill%3D%22none%22%3E%3C%2Frect%3E%3Ccircle%20cx%3D%228%22%20cy%3D%225.6%22%20r%3D%226.25%22%20fill%3D%22none%22%20stroke%3D%22%23603553%22%20stroke-width%3D%221%22%3E%3C%2Fcircle%3E%3Ccircle%20cx%3D%228%22%20cy%3D%2210.4%22%20r%3D%223.5%22%20fill%3D%22none%22%20stroke%3D%22%23603553%22%20stroke-width%3D%221%22%3E%3C%2Fcircle%3E%3C%2Fsvg%3E" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./public/styles.css" />
    <link rel="stylesheet" href="./public/stoneface.css" />
  </head>
  <body class="stoneface-mode">
    <script type="module" src="./public/chapter-header.js"></script>
    <div class="chapter-page-shell chapter-page">
      <mal-chapter-header label="stoneface" logo-variant="left"></mal-chapter-header>
    </div>
    <main class="stonefaceViewport" aria-label="Stone canvas page" tabindex="0">
      <section class="stonefaceCanvas" role="list" aria-label="Expressive stone cards">
        <h1 id="stoneface-title">
          <span class="stoneface-title-main">stoneface</span>
          <span class="stoneface-title-sub">an expressive surface for AI agents</span>
        </h1>
      </section>
    </main>
    <div id="stoneface-drawer-backdrop" class="stoneface-drawer-backdrop" hidden></div>
    <aside id="stoneface-drawer" class="stoneface-drawer gr-panel" aria-label="Stone details drawer" aria-hidden="true">
      <div class="stoneface-drawer-head">
        <p id="drawer-emotion" class="stoneface-drawer-emotion">emotion</p>
        <button id="drawer-close" type="button" class="gr-btn">Close</button>
      </div>
      <div class="stoneface-drawer-card gr-panel">
        <div class="stoneface-drawer-preview-wrap">
          <canvas id="drawer-stone-canvas" class="stoneface-drawer-preview" width="512" height="512" aria-label="Animated selected stone"></canvas>
        </div>
        <div id="drawer-chips" class="stoneface-drawer-chips" aria-label="Stone tags"></div>
        <p id="drawer-meta" class="stoneface-drawer-meta"></p>
        <p id="drawer-caption" class="stoneface-drawer-caption"></p>
        <p id="drawer-rationale" class="stoneface-drawer-rationale"></p>
      </div>
      <div class="stoneface-drawer-card gr-panel">
        <p class="stoneface-drawer-section">Shader profile</p>
        <p id="drawer-shape" class="stoneface-drawer-value"></p>
        <p id="drawer-noise" class="stoneface-drawer-value"></p>
        <p id="drawer-cut" class="stoneface-drawer-value"></p>
        <p id="drawer-seed" class="stoneface-drawer-value"></p>
      </div>
    </aside>
    <template id="stone-card-template">
      <figure class="mediaItem" role="listitem" tabindex="0">
        <div class="mediaBlock" aria-hidden="true">
          <canvas class="stoneShaderCanvas" width="512" height="512"></canvas>
        </div>
        <figcaption class="attribution"></figcaption>
      </figure>
    </template>
    <script type="module">
      import { initMalLogos, setPageFavicon } from "./public/mal-logo.js";

      initMalLogos();
      setPageFavicon("left");
    </script>
    <script type="module" src="./public/stoneface.js"></script>
  </body>
</html>
