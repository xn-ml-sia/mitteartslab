  <body class="portfolio-page">
    <script type="module" src="/public/chapter-header.js"></script>
    <div class="portfolio-hover-bg" id="portfolio-hover-bg" aria-hidden="true"></div>
    <div class="portfolio-shell">
      <mal-chapter-header logo-variant="bottom"></mal-chapter-header>

      <section class="portfolio-sketch501" aria-label="Portfolio hero">
        <!-- PORTFOLIO_SKETCH501_HERO -->
      </section>

      <main class="portfolio-main" id="portfolio-root" aria-label="Work"></main>
    </div>

    <div class="portfolio-detail" id="portfolio-detail" hidden aria-hidden="true">
      <button type="button" class="portfolio-detail__back" aria-label="Back to portfolio">
        <img
          src="/public/assets/dot-icon/arrow-left.svg"
          alt=""
          width="24"
          height="24"
          decoding="async"
        />
      </button>
      <div class="portfolio-detail__gallery" aria-label="Project images">
        <div class="portfolio-detail__img is-primary">
          <div class="portfolio-detail__hero-flip">
            <div class="portfolio-detail__hero-flip-inner">
              <div class="portfolio-detail__hero-face portfolio-detail__hero-face--front" role="img" aria-hidden="true"></div>
              <div class="portfolio-detail__hero-face portfolio-detail__hero-face--back">
                <section class="portfolio-detail__phone" aria-label="Mobile app layers" hidden>
                  <div class="portfolio-phone" data-phone-root>
                    <div class="portfolio-phone__stage">
                      <div class="portfolio-phone__perspective">
                        <div class="portfolio-phone__device">
                          <div class="portfolio-phone__screens" data-phone-screens></div>
                        </div>
                      </div>
                      <div class="portfolio-phone__annotations" data-phone-labels aria-hidden="true"></div>
                    </div>
                    <div class="portfolio-phone__flat-fallback" data-phone-flat hidden></div>
                  </div>
                </section>
              </div>
            </div>
          </div>
        </div>
        <div class="portfolio-detail__img" role="img" aria-hidden="true"></div>
        <div class="portfolio-detail__img" role="img" aria-hidden="true"></div>
        <div class="portfolio-detail__img" role="img" aria-hidden="true"></div>
      </div>
      <div class="portfolio-detail__content">
        <h2 class="portfolio-detail__title portfolio-company-title"></h2>
        <p class="portfolio-detail__subtitle"></p>
        <p class="portfolio-detail__description"></p>
      </div>
    </div>

    <script src="/public/vendor/gsap.min.js"></script>
    <script src="/public/vendor/Flip.min.js"></script>
    <script type="module" src="/public/portfolio-sketch501/portfolio-sketch501.js"></script>
    <script type="module" src="/public/portfolio.js"></script>
